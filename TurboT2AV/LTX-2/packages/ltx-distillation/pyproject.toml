[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ltx-distillation"
version = "0.1.0"
description = "TurboT2AV inference runner for LTX-2 audio-video generation"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Apache-2.0"}

dependencies = [
    "torch>=2.2.0",
    "omegaconf>=2.3.0",
    "safetensors>=0.4.0",
    "einops>=0.7.0",
    "av>=17.0.0",
    "ltx-core",
    "ltx-pipelines",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"*" = ["*.yaml", "*.txt"]
